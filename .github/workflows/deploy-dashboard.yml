name: Update and deploy dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Runs after the regular US market close, around 06:00 Taiwan time during US daylight saving time.
    - cron: "20 22 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update performance data
        if: github.event_name != 'push'
        run: npm run update:performance

      - name: Update briefing data
        if: github.event_name != 'push'
        run: npm run update:briefing

      - name: Upload web artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
